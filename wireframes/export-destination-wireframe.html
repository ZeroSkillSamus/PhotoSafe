<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PhotoSafe Export Destination Wireframe</title>
  <style>
    :root {
      --text: #e3e8f0;
      --muted: rgba(227, 232, 240, 0.68);
      --background: #080b0e;
      --primary: #a5b6ce;
      --secondary: #3e3867;
      --accent: #896db0;
      --divider: rgba(227, 232, 240, 0.14);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #15181d;
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
    }

    .phone {
      width: min(390px, 100vw);
      height: min(844px, 100vh);
      overflow: hidden;
      background: var(--background);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 34px;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.48);
      position: relative;
    }

    .app {
      min-height: 100%;
      display: flex;
      flex-direction: column;
      background: var(--background);
    }

    .status {
      height: 44px;
      display: flex;
      align-items: end;
      justify-content: space-between;
      padding: 0 28px 7px;
      font-size: 13px;
      font-weight: 700;
    }

    .header {
      height: 44px;
      display: grid;
      grid-template-columns: 70px 1fr 70px;
      align-items: center;
      padding: 0 16px;
      background: var(--secondary);
    }

    .header h1 {
      margin: 0;
      text-align: center;
      font-size: 22px;
      line-height: 1;
    }

    .content {
      flex: 1;
      padding: 18px 16px 110px;
    }

    .section-title {
      margin: 0 0 10px 2px;
      font-size: 20px;
      font-weight: 760;
    }

    .settings-card {
      border-radius: 15px;
      overflow: hidden;
      background: rgba(137, 109, 176, 0.75);
    }

    .settings-row {
      display: grid;
      grid-template-columns: 36px 1fr auto;
      gap: 12px;
      align-items: center;
      min-height: 68px;
      padding: 13px 14px;
    }

    .icon {
      width: 32px;
      height: 32px;
      display: grid;
      place-items: center;
      border-radius: 10px;
      background: rgba(165, 182, 206, 0.12);
      font-size: 16px;
    }

    .row-title {
      font-size: 16px;
      font-weight: 760;
      margin-bottom: 3px;
    }

    .row-subtitle {
      color: rgba(227, 232, 240, 0.72);
      font-size: 13px;
      line-height: 1.25;
    }

    .value {
      display: flex;
      gap: 6px;
      align-items: center;
      color: rgba(227, 232, 240, 0.8);
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
    }

    .chevron {
      font-size: 22px;
      line-height: 1;
      opacity: 0.65;
    }

    .scrim {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.4);
      display: flex;
      align-items: end;
    }

    .sheet {
      width: 100%;
      padding: 10px 16px 22px;
      border-radius: 24px 24px 0 0;
      background: var(--background);
      border-top: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow: 0 -18px 48px rgba(0, 0, 0, 0.45);
    }

    .grabber {
      width: 44px;
      height: 5px;
      border-radius: 999px;
      margin: 0 auto 18px;
      background: rgba(227, 232, 240, 0.28);
    }

    .sheet-header {
      margin-bottom: 16px;
    }

    .sheet-title {
      margin: 0 0 5px;
      font-size: 22px;
      font-weight: 800;
    }

    .sheet-subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.35;
    }

    .choice-group {
      display: grid;
      gap: 10px;
      margin-bottom: 16px;
    }

    .choice {
      display: grid;
      grid-template-columns: 28px 1fr;
      gap: 12px;
      align-items: start;
      min-height: 70px;
      padding: 14px;
      border-radius: 15px;
      background: rgba(62, 56, 103, 0.76);
      border: 1px solid rgba(227, 232, 240, 0.09);
    }

    .choice.selected {
      background: rgba(137, 109, 176, 0.78);
      border-color: rgba(227, 232, 240, 0.2);
    }

    .radio {
      width: 24px;
      height: 24px;
      display: grid;
      place-items: center;
      border: 2px solid rgba(227, 232, 240, 0.65);
      border-radius: 999px;
      margin-top: 1px;
    }

    .selected .radio {
      border-color: var(--text);
      background: var(--text);
    }

    .selected .radio::after {
      content: "";
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: var(--accent);
    }

    .choice-title {
      font-size: 16px;
      font-weight: 780;
      margin-bottom: 4px;
    }

    .choice-subtitle {
      color: rgba(227, 232, 240, 0.72);
      font-size: 13px;
      line-height: 1.28;
    }

    .field-block {
      margin: 4px 0 18px;
    }

    .field-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 0 2px 8px;
      color: var(--text);
      font-size: 13px;
      font-weight: 760;
    }

    .counter {
      color: var(--muted);
      font-size: 12px;
    }

    .field {
      width: 100%;
      height: 46px;
      border: 0;
      outline: 0;
      border-radius: 12px;
      padding: 0 12px;
      background: var(--primary);
      color: var(--background);
      font-size: 16px;
      font-weight: 760;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .button {
      height: 52px;
      border: 0;
      border-radius: 15px;
      color: var(--text);
      font-size: 16px;
      font-weight: 800;
      font-family: inherit;
    }

    .button.secondary {
      background: rgba(62, 56, 103, 0.76);
    }

    .button.primary {
      background: var(--accent);
    }

    @media (max-width: 430px) {
      body {
        display: block;
        background: var(--background);
      }

      .phone {
        width: 100vw;
        height: 100vh;
        border: 0;
        border-radius: 0;
        box-shadow: none;
      }
    }
  </style>
</head>
<body>
  <main class="phone" aria-label="PhotoSafe export destination wireframe">
    <div class="app">
      <div class="status">
        <span>9:41</span>
        <span>▰ ▰ ◒</span>
      </div>

      <header class="header">
        <div></div>
        <h1>Settings</h1>
        <div></div>
      </header>

      <section class="content">
        <h2 class="section-title">Media</h2>
        <div class="settings-card">
          <div class="settings-row">
            <div class="icon">▣</div>
            <div>
              <div class="row-title">Export Destination</div>
              <div class="row-subtitle">Choose where saved media is sent</div>
            </div>
            <div class="value">
              Photos Library
              <span class="chevron">›</span>
            </div>
          </div>
        </div>
      </section>
    </div>

    <div class="scrim">
      <section class="sheet" aria-label="Export destination settings sheet">
        <div class="grabber"></div>

        <div class="sheet-header">
          <h2 class="sheet-title">Export Destination</h2>
          <p class="sheet-subtitle">Choose where exported photos and videos should go.</p>
        </div>

        <div class="choice-group">
          <div class="choice selected">
            <div class="radio" aria-hidden="true"></div>
            <div>
              <div class="choice-title">Photos Library</div>
              <div class="choice-subtitle">Save to Recents in the Photos app</div>
            </div>
          </div>

          <div class="choice">
            <div class="radio" aria-hidden="true"></div>
            <div>
              <div class="choice-title">Photos Album</div>
              <div class="choice-subtitle">Save to a named Photos album</div>
            </div>
          </div>
        </div>

        <div class="field-block">
          <div class="field-label">
            <span>Album Name</span>
            <span class="counter">17/24</span>
          </div>
          <input class="field" value="PhotoSafe Exports" aria-label="Album name">
        </div>

        <div class="actions">
          <button class="button secondary">Reset</button>
          <button class="button primary">Save</button>
        </div>
      </section>
    </div>
  </main>
</body>
</html>
