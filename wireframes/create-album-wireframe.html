<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PhotoSafe Create Album Wireframe</title>
  <style>
    :root {
      --text: #e3e8f0;
      --muted: rgba(227, 232, 240, 0.64);
      --background: #080b0e;
      --primary: #a5b6ce;
      --secondary: #3e3867;
      --accent: #896db0;
      --accent-2: #5fa8c8;
      --surface: rgba(227, 232, 240, 0.075);
      --surface-strong: rgba(227, 232, 240, 0.12);
      --line: rgba(227, 232, 240, 0.13);
      --input: rgba(227, 232, 240, 0.94);
      --safe: #64d99a;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #15181d;
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
    }

    button,
    input {
      border: 0;
      color: inherit;
      font: inherit;
    }

    .phone {
      width: min(390px, 100vw);
      height: min(844px, 100vh);
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 34px;
      background: var(--background);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.48);
    }

    .app {
      height: 100%;
      display: flex;
      flex-direction: column;
      background: var(--background);
    }

    .status {
      height: 44px;
      display: flex;
      align-items: end;
      justify-content: space-between;
      padding: 0 28px 7px;
      font-size: 13px;
      font-weight: 700;
    }

    .album-bg {
      flex: 1;
      padding: 18px 18px 0;
      background:
        radial-gradient(circle at 82% 4%, rgba(95, 168, 200, 0.16), transparent 32%),
        linear-gradient(180deg, rgba(62, 56, 103, 0.36), transparent 35%),
        var(--background);
    }

    .album-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
    }

    .album-title {
      margin: 0;
      font-size: 31px;
      line-height: 1;
      letter-spacing: 0;
    }

    .grid-icon {
      width: 40px;
      height: 40px;
      display: grid;
      place-items: center;
      border-radius: 14px;
      background: var(--surface-strong);
      border: 1px solid var(--line);
      color: var(--primary);
      font-size: 20px;
      font-weight: 850;
    }

    .album-list {
      display: grid;
      gap: 12px;
    }

    .album-row {
      min-height: 86px;
      display: grid;
      grid-template-columns: 78px 1fr auto;
      gap: 13px;
      align-items: center;
      padding: 9px 11px;
      border: 1px solid rgba(227, 232, 240, 0.09);
      border-radius: 16px;
      background: rgba(62, 56, 103, 0.36);
    }

    .thumb {
      width: 78px;
      height: 68px;
      border-radius: 13px;
      background:
        linear-gradient(135deg, rgba(137, 109, 176, 0.75), rgba(95, 168, 200, 0.72)),
        #28303b;
    }

    .album-copy {
      min-width: 0;
    }

    .album-copy strong,
    .album-copy span {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .album-copy strong {
      font-size: 16px;
      line-height: 1.2;
    }

    .album-copy span {
      margin-top: 5px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 650;
    }

    .lock {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border-radius: 12px;
      background: rgba(8, 11, 14, 0.38);
      color: var(--primary);
      font-size: 15px;
    }

    .sheet {
      height: 566px;
      display: flex;
      flex-direction: column;
      margin: -528px 0 0;
      border-radius: 28px 28px 0 0;
      border: 1px solid rgba(227, 232, 240, 0.14);
      border-bottom: 0;
      background:
        linear-gradient(180deg, rgba(62, 56, 103, 0.52), rgba(8, 11, 14, 0.98) 38%),
        var(--background);
      box-shadow: 0 -28px 80px rgba(0, 0, 0, 0.58);
      backdrop-filter: blur(22px);
    }

    .grabber {
      width: 42px;
      height: 5px;
      align-self: center;
      margin: 10px 0 12px;
      border-radius: 999px;
      background: rgba(227, 232, 240, 0.28);
    }

    .sheet-header {
      display: grid;
      grid-template-columns: 44px 1fr 44px;
      align-items: center;
      padding: 0 16px 14px;
    }

    .icon-button {
      width: 38px;
      height: 38px;
      display: grid;
      place-items: center;
      border-radius: 14px;
      background: var(--surface);
      border: 1px solid var(--line);
      color: var(--text);
      font-size: 18px;
      font-weight: 820;
    }

    .sheet-heading {
      text-align: center;
    }

    .eyebrow {
      color: var(--muted);
      font-size: 11px;
      font-weight: 820;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    h2 {
      margin: 3px 0 0;
      font-size: 21px;
      line-height: 1;
      letter-spacing: 0;
    }

    .sheet-content {
      flex: 1;
      overflow: auto;
      padding: 0 16px 18px;
    }

    .cover-picker {
      min-height: 138px;
      display: grid;
      grid-template-columns: 118px 1fr;
      gap: 14px;
      align-items: stretch;
      margin-bottom: 17px;
    }

    .cover-preview {
      position: relative;
      overflow: hidden;
      border-radius: 18px;
      border: 1px solid rgba(227, 232, 240, 0.18);
      background:
        linear-gradient(135deg, rgba(137, 109, 176, 0.92), rgba(95, 168, 200, 0.76)),
        #28303b;
      box-shadow: 0 14px 34px rgba(0, 0, 0, 0.26);
    }

    .cover-preview::before,
    .cover-preview::after {
      content: "";
      position: absolute;
      border-radius: 18px;
      background: rgba(227, 232, 240, 0.18);
    }

    .cover-preview::before {
      width: 68px;
      height: 68px;
      left: 18px;
      top: 19px;
      transform: rotate(14deg);
    }

    .cover-preview::after {
      width: 104px;
      height: 42px;
      right: -27px;
      bottom: 15px;
      transform: rotate(-18deg);
    }

    .camera-badge {
      position: absolute;
      right: 10px;
      bottom: 10px;
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border-radius: 12px;
      background: rgba(8, 11, 14, 0.62);
      border: 1px solid rgba(227, 232, 240, 0.18);
      font-size: 16px;
    }

    .cover-copy {
      display: grid;
      align-content: center;
      gap: 9px;
      min-width: 0;
    }

    .cover-copy strong {
      font-size: 17px;
      line-height: 1.15;
    }

    .cover-copy p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
    }

    .small-action {
      width: max-content;
      height: 34px;
      padding: 0 12px;
      border-radius: 12px;
      background: rgba(137, 109, 176, 0.5);
      border: 1px solid rgba(227, 232, 240, 0.15);
      font-size: 13px;
      font-weight: 800;
    }

    .field-group {
      display: grid;
      gap: 13px;
    }

    .field {
      display: grid;
      gap: 7px;
    }

    label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 830;
      text-transform: uppercase;
    }

    .input-shell {
      height: 52px;
      display: grid;
      grid-template-columns: 28px 1fr auto;
      gap: 9px;
      align-items: center;
      padding: 0 14px;
      border-radius: 16px;
      background: var(--input);
      color: rgba(8, 11, 14, 0.92);
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.2);
    }

    .input-shell input {
      width: 100%;
      min-width: 0;
      outline: 0;
      background: transparent;
      color: rgba(8, 11, 14, 0.95);
      font-size: 16px;
      font-weight: 760;
    }

    .input-shell input::placeholder {
      color: rgba(8, 11, 14, 0.42);
    }

    .field-icon {
      color: rgba(8, 11, 14, 0.58);
      font-size: 16px;
      font-weight: 850;
    }

    .count {
      color: rgba(8, 11, 14, 0.48);
      font-size: 12px;
      font-weight: 850;
    }

    .privacy-row {
      min-height: 66px;
      display: grid;
      grid-template-columns: 38px 1fr auto;
      gap: 12px;
      align-items: center;
      margin-top: 16px;
      padding: 12px 14px;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: var(--surface);
    }

    .privacy-icon {
      width: 38px;
      height: 38px;
      display: grid;
      place-items: center;
      border-radius: 13px;
      background: rgba(100, 217, 154, 0.14);
      color: var(--safe);
      font-size: 17px;
    }

    .privacy-title {
      font-size: 14px;
      font-weight: 820;
    }

    .privacy-subtitle {
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.25;
    }

    .switch {
      width: 48px;
      height: 29px;
      padding: 3px;
      border-radius: 999px;
      background: var(--accent);
    }

    .switch::after {
      content: "";
      display: block;
      width: 23px;
      height: 23px;
      margin-left: auto;
      border-radius: 999px;
      background: var(--text);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.34);
    }

    .sheet-actions {
      display: grid;
      grid-template-columns: 54px 1fr;
      gap: 10px;
      padding: 11px 16px max(16px, env(safe-area-inset-bottom));
      border-top: 1px solid var(--line);
      background: rgba(8, 11, 14, 0.88);
      backdrop-filter: blur(18px);
    }

    .secondary-action,
    .primary-action {
      height: 52px;
      border-radius: 16px;
      font-weight: 850;
    }

    .secondary-action {
      display: grid;
      place-items: center;
      background: var(--surface-strong);
      border: 1px solid var(--line);
      font-size: 19px;
    }

    .primary-action {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      box-shadow: 0 16px 30px rgba(0, 0, 0, 0.32);
      font-size: 16px;
    }

    @media (max-height: 740px) {
      .sheet {
        height: 586px;
        margin-top: -558px;
      }

      .cover-picker {
        min-height: 112px;
        margin-bottom: 13px;
      }

      .sheet-header {
        padding-bottom: 10px;
      }

      .field-group {
        gap: 10px;
      }

      .privacy-row {
        margin-top: 12px;
      }
    }
  </style>
</head>
<body>
  <main class="phone" aria-label="PhotoSafe create album wireframe">
    <section class="app">
      <div class="status">
        <span>9:41</span>
        <span>5G  ▰</span>
      </div>

      <div class="album-bg">
        <div class="album-top">
          <h1 class="album-title">Album</h1>
          <div class="grid-icon">⊞</div>
        </div>

        <div class="album-list" aria-hidden="true">
          <div class="album-row">
            <div class="thumb"></div>
            <div class="album-copy">
              <strong>Camera Roll</strong>
              <span>34 items</span>
            </div>
            <div class="lock">⌁</div>
          </div>
          <div class="album-row">
            <div class="thumb"></div>
            <div class="album-copy">
              <strong>Receipts</strong>
              <span>12 items</span>
            </div>
            <div class="lock">⌁</div>
          </div>
        </div>
      </div>

      <form class="sheet">
        <div class="grabber"></div>

        <header class="sheet-header">
          <button class="icon-button" type="button" aria-label="Close">×</button>
          <div class="sheet-heading">
            <div class="eyebrow">Private Library</div>
            <h2>Create Album</h2>
          </div>
          <button class="icon-button" type="button" aria-label="Help">?</button>
        </header>

        <div class="sheet-content">
          <section class="cover-picker" aria-label="Album cover">
            <button class="cover-preview" type="button" aria-label="Choose album cover">
              <span class="camera-badge">⌁</span>
            </button>
            <div class="cover-copy">
              <strong>Choose a cover that is easy to recognize.</strong>
              <p>This is only shown inside PhotoSafe after unlock.</p>
              <button class="small-action" type="button">Pick Image</button>
            </div>
          </section>

          <section class="field-group">
            <div class="field">
              <label for="album-name">Album Name</label>
              <div class="input-shell">
                <span class="field-icon">▣</span>
                <input id="album-name" value="Summer Vault" maxlength="15">
                <span class="count">12/15</span>
              </div>
            </div>

            <div class="field">
              <label for="album-password">Password</label>
              <div class="input-shell">
                <span class="field-icon">⌁</span>
                <input id="album-password" value="••••" type="password">
                <span class="count">Optional</span>
              </div>
            </div>
          </section>

          <section class="privacy-row" aria-label="Album lock setting">
            <div class="privacy-icon">✓</div>
            <div>
              <div class="privacy-title">Lock this album</div>
              <div class="privacy-subtitle">Require the album password before opening.</div>
            </div>
            <div class="switch" aria-hidden="true"></div>
          </section>
        </div>

        <div class="sheet-actions">
          <button class="secondary-action" type="button" aria-label="Cancel">×</button>
          <button class="primary-action" type="submit">Create Album</button>
        </div>
      </form>
    </section>
  </main>
</body>
</html>
