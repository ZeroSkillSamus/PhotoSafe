<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PhotoSafe No Albums Empty State Wireframe</title>
  <style>
    :root {
      --text: #e3e8f0;
      --muted: rgba(227, 232, 240, 0.62);
      --background: #080b0e;
      --primary: #a5b6ce;
      --secondary: #3e3867;
      --accent: #896db0;
      --accent-2: #5fa8c8;
      --surface: rgba(227, 232, 240, 0.075);
      --surface-strong: rgba(227, 232, 240, 0.12);
      --line: rgba(227, 232, 240, 0.12);
      --safe: #64d99a;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #15181d;
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
    }

    button {
      border: 0;
      color: inherit;
      font: inherit;
    }

    .phone {
      width: min(390px, 100vw);
      height: min(844px, 100vh);
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 34px;
      background: var(--background);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.48);
    }

    .app {
      height: 100%;
      display: flex;
      flex-direction: column;
      background:
        radial-gradient(circle at 82% 0%, rgba(95, 168, 200, 0.14), transparent 31%),
        linear-gradient(180deg, rgba(62, 56, 103, 0.28), transparent 34%),
        var(--background);
    }

    .status {
      height: 44px;
      display: flex;
      align-items: end;
      justify-content: space-between;
      padding: 0 28px 7px;
      font-size: 13px;
      font-weight: 760;
    }

    .content {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      padding: 18px 16px 0;
    }

    .home-top {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 14px;
      align-items: start;
      margin-bottom: 8px;
    }

    h1,
    h2,
    p {
      margin: 0;
    }

    h1 {
      font-size: 35px;
      line-height: 0.98;
      letter-spacing: 0;
    }

    .home-subtitle {
      margin-top: 6px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.3;
    }

    .top-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .icon-button {
      width: 38px;
      height: 38px;
      display: grid;
      place-items: center;
      border-radius: 14px;
      background: var(--surface-strong);
      border: 1px solid var(--line);
      color: var(--text);
      font-size: 18px;
      font-weight: 820;
      backdrop-filter: blur(18px);
    }

    .empty {
      flex: 1;
      min-height: 0;
      display: grid;
      align-content: center;
      justify-items: center;
      gap: 20px;
      padding: 0 6px 48px;
      text-align: center;
    }

    .album-visual {
      position: relative;
      width: 188px;
      height: 154px;
      margin-bottom: 2px;
    }

    .album-card {
      position: absolute;
      border-radius: 22px;
      border: 1px solid rgba(227, 232, 240, 0.16);
      background: linear-gradient(135deg, rgba(137, 109, 176, 0.86), rgba(95, 168, 200, 0.72));
      box-shadow: 0 18px 42px rgba(0, 0, 0, 0.28);
    }

    .album-card.back {
      width: 132px;
      height: 100px;
      left: 3px;
      top: 22px;
      opacity: 0.58;
      transform: rotate(-12deg);
    }

    .album-card.mid {
      width: 148px;
      height: 112px;
      left: 24px;
      top: 17px;
      opacity: 0.72;
      transform: rotate(8deg);
      background: linear-gradient(135deg, rgba(165, 182, 206, 0.76), rgba(62, 56, 103, 0.86));
    }

    .album-card.front {
      width: 150px;
      height: 116px;
      left: 18px;
      top: 30px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, rgba(137, 109, 176, 0.94), rgba(95, 168, 200, 0.78));
    }

    .lock-badge {
      width: 48px;
      height: 48px;
      display: grid;
      place-items: center;
      border-radius: 17px;
      background: rgba(8, 11, 14, 0.58);
      border: 1px solid rgba(227, 232, 240, 0.18);
      color: var(--safe);
      font-size: 22px;
      font-weight: 850;
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.24);
    }

    .empty-copy {
      display: grid;
      gap: 9px;
      max-width: 320px;
    }

    h2 {
      font-size: 28px;
      line-height: 1;
      letter-spacing: 0;
    }

    .empty-copy p {
      color: var(--primary);
      font-size: 15px;
      line-height: 1.36;
    }

    .actions {
      display: grid;
      gap: 11px;
      width: min(100%, 312px);
      margin-top: 2px;
    }

    .primary-action {
      height: 52px;
      border-radius: 16px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      box-shadow: 0 16px 30px rgba(0, 0, 0, 0.32);
      color: var(--text);
      font-size: 16px;
      font-weight: 850;
    }

    .hint {
      display: grid;
      grid-template-columns: 34px 1fr;
      gap: 10px;
      align-items: center;
      width: min(100%, 322px);
      padding: 11px 12px;
      border-radius: 17px;
      border: 1px solid var(--line);
      background: var(--surface);
      text-align: left;
    }

    .hint-icon {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border-radius: 12px;
      background: rgba(100, 217, 154, 0.14);
      color: var(--safe);
      font-size: 16px;
      font-weight: 850;
    }

    .hint-title {
      font-size: 13px;
      font-weight: 820;
    }

    .hint-copy {
      margin-top: 2px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.25;
    }

    .tabbar {
      height: 67px;
      display: grid;
      grid-template-columns: 1fr 1fr 66px 1fr 1fr;
      align-items: center;
      padding: 6px 12px 9px;
      background: var(--secondary);
      border-top: 1px solid rgba(227, 232, 240, 0.1);
    }

    .tab {
      display: grid;
      justify-items: center;
      gap: 4px;
      color: rgba(8, 11, 14, 0.95);
      font-size: 10px;
      font-weight: 780;
    }

    .tab.active {
      color: var(--accent);
    }

    .tab-symbol {
      font-size: 18px;
      font-weight: 850;
      line-height: 1;
    }

    .plus {
      width: 58px;
      height: 58px;
      display: grid;
      place-items: center;
      justify-self: center;
      margin-top: -24px;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: var(--text);
      font-size: 28px;
      font-weight: 700;
      box-shadow: 0 14px 30px rgba(0, 0, 0, 0.34);
    }

    @media (max-height: 740px) {
      .empty {
        gap: 15px;
        padding-bottom: 28px;
      }

      .album-visual {
        width: 164px;
        height: 132px;
      }

      .album-card.back {
        width: 116px;
        height: 88px;
      }

      .album-card.mid {
        width: 128px;
        height: 98px;
      }

      .album-card.front {
        width: 132px;
        height: 102px;
      }

      h2 {
        font-size: 25px;
      }

      .empty-copy p {
        font-size: 14px;
      }
    }
  </style>
</head>
<body>
  <main class="phone" aria-label="PhotoSafe no albums empty state wireframe">
    <section class="app">
      <div class="status">
        <span>9:41</span>
        <span>5G</span>
      </div>

      <section class="content">
        <header class="home-top">
          <div>
            <h1>Albums</h1>
            <p class="home-subtitle">No private collections yet</p>
          </div>
          <div class="top-actions">
            <button class="icon-button" type="button" aria-label="Create album">+</button>
          </div>
        </header>

        <div class="empty">
          <div class="album-visual" aria-hidden="true">
            <div class="album-card back"></div>
            <div class="album-card mid"></div>
            <div class="album-card front">
              <div class="lock-badge">L</div>
            </div>
          </div>

          <div class="empty-copy">
            <h2>Create your first private album</h2>
            <p>Albums keep imported photos, videos, and saved web media organized behind your PhotoSafe lock.</p>
          </div>

          <div class="actions">
            <button class="primary-action" type="button">Create Album</button>
          </div>

          <div class="hint">
            <div class="hint-icon">✓</div>
            <div>
              <div class="hint-title">Private by default</div>
              <div class="hint-copy">Choose a name now. Add media after the album exists.</div>
            </div>
          </div>
        </div>
      </section>

      <nav class="tabbar" aria-label="Tabs">
        <div class="tab active"><span class="tab-symbol">A</span><span>Albums</span></div>
        <div class="tab"><span class="tab-symbol">H</span><span>Favorites</span></div>
        <div class="plus">+</div>
        <div class="tab"><span class="tab-symbol">W</span><span>Web</span></div>
        <div class="tab"><span class="tab-symbol">S</span><span>Settings</span></div>
      </nav>
    </section>
  </main>
</body>
</html>
